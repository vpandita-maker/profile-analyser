<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 322 120" height="36" width="97">
  <!-- Bold "I" -->
  <text x="2" y="100"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="90" font-weight="900" fill="#1a1a1a">I</text>

  <!-- Red heart: centered at x=112, equal ~20px gap from I and box -->
  <path d="M112,42 C112,28 90,12 68,22 C48,34 48,58 112,108 C176,58 176,34 156,22 C134,12 112,28 112,42Z" fill="#CC1F1A"/>

  <!-- LinkedIn "in" box: starts at x=187, center x=252 -->
  <rect x="187" y="5" width="130" height="112" rx="18" fill="#0A66C2"/>

  <!-- "in" centered in box -->
  <text
    x="252" y="61"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="64" font-weight="900" fill="white"
    text-anchor="middle" dominant-baseline="central">in</text>
</svg>
